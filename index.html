<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Алгыс</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, serif;
}


html,body{
width:100%;
overflow-x:hidden;
}



body{

background:

linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.65)
),

url("fon.png")

center/cover fixed;


color:white;

min-height:100vh;

}




header{

padding:30px 50px 70px;

text-align:center;

position:relative;

}



/* логотип сверху */

.logo-top{

position:absolute;

left:40px;

top:25px;


width:90px;

height:90px;


background:rgba(255,255,255,.15);


border-radius:20px;


padding:10px;

}



.logo-top img{

width:100%;

height:100%;

object-fit:contain;

}




.sun{

width:140px;

height:140px;


background:#ffd95a;


border-radius:50%;


margin:40px auto 0;


box-shadow:

0 0 70px #ffd95a;


animation:sun 3s infinite;

}



@keyframes sun{

50%{

transform:scale(1.1);

}

}




header h1{

padding-top:60px;

font-size:55px;

letter-spacing:5px;

}



header p{

font-size:22px;

margin-top:20px;

}





.container{

width:100%;

max-width:1000px;

margin:auto;

padding:30px;

}





.card{

background:

rgba(255,255,255,.13);


backdrop-filter:blur(12px);


border-radius:25px;


padding:35px;


margin-bottom:30px;


border:

1px solid rgba(255,255,255,.3);

}





h2{

text-align:center;

font-size:35px;

margin-bottom:25px;

}




.pattern{

text-align:center;

font-size:45px;

color:#ffd95a;

}





button{

background:#d9a441;


border:none;


color:white;


padding:15px 30px;


border-radius:30px;


font-size:18px;


cursor:pointer;


margin:10px;

}



button:hover{

background:#ffd95a;

color:black;

}




.wishes{

display:flex;

gap:30px;

}



.wish{

width:50%;

text-align:center;

font-size:20px;

line-height:1.8;

}



.wish h3{

color:#ffd95a;

font-size:26px;

margin-bottom:20px;

}




.player{

text-align:center;

margin-top:20px;

}



audio{

display:none;

}





footer{

text-align:center;

padding:30px;

font-size:18px;

}







@media(max-width:600px){



header{

padding:25px 15px 50px;

}



.logo-top{

left:15px;

top:15px;


width:65px;

height:65px;

}



header h1{

padding-top:80px;

font-size:32px;

}



header p{

font-size:17px;

}



.sun{

width:90px;

height:90px;

}



.container{

padding:15px;

}



.card{

padding:22px;

}



h2{

font-size:25px;

}



button{

width:90%;

}



.wishes{

flex-direction:column;

}



.wish{

width:100%;

font-size:17px;

}



}

</style>

</head>



<body>



<header>


<div class="logo-top">

<img src="logo.png">

</div>



<div class="sun"></div>



<h1>

☀ АЛГЫС ☀

</h1>



</header>





<div class="container">





<div class="card">


<div class="pattern">

☀☀☀☀☀

</div>


<center>


<button onclick="changeAudio('yakut')">

Сахалыы Алгыс

</button>



<button onclick="changeAudio('russian')">

Алгыс на русском

</button>




<br><br>




<button onclick="togglePlay()">

▶️ 

</button>




<audio id="audioPlayer">

<source id="audioSource" src="algys_yakut.mp3">

</audio>



</center>


</div>








<div class="card">






<div class="wishes">



<div class="wish">


<h3>

Русский

</h3>





</div>






<div class="wish">


<h3>

Сахалыы

</h3>





</div>



</div>


</div>





</div>







<footer>





</footer>






<script>


let audio = 
document.getElementById("audioPlayer");


let source = 
document.getElementById("audioSource");





function changeAudio(type){


if(type=="yakut"){


source.src="algys_yakut.mp3";


}

else{


source.src="algys_russian.mp3";


}


audio.load();

audio.play();


}






function togglePlay(){


if(audio.paused){


audio.play();


}

else{


audio.pause();


}


}



</script>




</body>

</html>
